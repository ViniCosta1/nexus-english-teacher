name: Build Flutter Web

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'assets/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: |
          # Using a dummy token for the build if not provided
          flutter build web --release --dart-define=BEACH_TALK_APP_TOKEN=dummy_token

      - name: Commit and Push api/public
        run: |
          rm -rf api/public
          cp -r build/web api/public
          
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add api/public
          
          # Only commit and push if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "build: auto-compile flutter web"
            git push
          else
            echo "No changes to commit"
          fi
