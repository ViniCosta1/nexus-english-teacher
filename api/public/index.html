<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Beach Talk — aprenda inglês para beach tennis">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Beach Talk">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#101010">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Beach Talk</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Fundo escuro enquanto o Flutter carrega — sem overflow ou height fixo
       para não clipar o canvas do Flutter no iOS Safari */
    body {
      background-color: #101010;
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- Limpa service worker e caches stale antes do Flutter inicializar.
       Necessário porque um flutter_bootstrap.js corrompido ficou cacheado
       e impedia o app de carregar em qualquer browser. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(r) { r.unregister(); });
      });
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
